// ---- Config ---------------------------------------------------------------
const MODEL = "claude-sonnet-4-6"; // swap to "claude-haiku-4-5-20251001" for lower cost

const ANALYSIS_PROMPT = `You are a careful nutrition estimation assistant. Look at the meal in this image.
Identify each distinct food/drink item and estimate nutrition for the PORTION actually shown.
Respond with ONLY valid JSON, no markdown or backticks, in this exact shape:
{
  "items": [ { "name": "string", "calories": number, "protein": number, "fat": number, "carbs": number } ],
  "total": { "calories": number, "protein": number, "fat": number, "carbs": number, "fiber": number, "sugar": number, "saturated_fat": number, "sodium": number, "cholesterol": number, "potassium": number },
  "confidence": "low" | "medium" | "high",
  "notes": "one short sentence about assumptions or what would improve accuracy"
}
calories in kcal; protein, fat, carbs, fiber, sugar, saturated_fat in grams; sodium, cholesterol, potassium in milligrams.
Give your best estimate for every field; use 0 only when truly not applicable. If no food is visible, return empty items, zeroed totals, low confidence, and explain in notes.`;

async function analyzeImage(base64, apiKey) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": apiKey, "anthropic-version": "2023-06-01",
      "content-type": "application/json", "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: MODEL, max_tokens: 1024,
      messages: [ { role: "user", content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: ANALYSIS_PROMPT },
      ] } ],
    }),
  });
  if (response.status === 401) throw new Error("API key was rejected. Check it in Settings (gear icon).");
  if (!response.ok) {
    let detail = "";
    try { const e = await response.json(); detail = (e && e.error && e.error.message) || ""; } catch (x) {}
    throw new Error(detail || ("Request failed (" + response.status + ")."));
  }
  const data = await response.json();
  const text = (data.content || []).filter(function (b) { return b.type === "text"; }).map(function (b) { return b.text; }).join("\n");
  const cleaned = text.replace(/```json|```/g, "").trim();
  const s = cleaned.indexOf("{"), e2 = cleaned.lastIndexOf("}");
  if (s === -1 || e2 === -1) throw new Error("Could not read the analysis. Try a clearer photo.");
  return JSON.parse(cleaned.slice(s, e2 + 1));
}

function processImage(file) {
  return new Promise(function (resolve, reject) {
    const reader = new FileReader();
    reader.onload = function () {
      const img = new Image();
      img.onload = function () {
        // Read EXIF orientation tag to fix sideways/upside-down phone photos.
        let orient = 1;

          const dv = new DataView(reader.result.slice(0, 65536));
          if (dv.getUint16(0) === 0xFFD8) {
            let off = 2;
            while (off + 4 < dv.byteLength) {
              const mk = dv.getUint16(off);
              if ((mk & 0xFF00) !== 0xFF00) break;
              if (mk === 0xFFE1) {
                const little = dv.getUint16(off + 10) === 0x4949;
                const ifd = off + 10 + dv.getUint32(off + 14, little);
                const n = dv.getUint16(ifd, little);

                }

              }
              off += 2 + dv.getUint16(off + 2);
            }
          }
        } catch (e2) {}

        function scaleTo(maxDim, quality) {
          let w = img.width, h = img.height;
          const swap = orient >= 5 && orient <= 8;
          if (swap) { w = img.height; h = img.width; }
          if (w > h && w > maxDim) { h = Math.round((h * maxDim) / w); w = maxDim; }
          else if (h > maxDim) { w = Math.round((w * maxDim) / h); h = maxDim; }
          const canvas = document.createElement("canvas"); canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          if      (orient === 2) { ctx.transform(-1, 0, 0,  1, w, 0); }
          else if (orient === 3) { ctx.transform(-1, 0, 0, -1, w, h); }
          else if (orient === 4) { ctx.transform( 1, 0, 0, -1, 0, h); }
          else if (orient === 5) { ctx.transform( 0, 1, 1,  0, 0, 0); }
          else if (orient === 6) { ctx.transform( 0, 1,-1,  0, h, 0); }
          else if (orient === 7) { ctx.transform( 0,-1,-1,  0, h, w); }
          else if (orient === 8) { ctx.transform( 0,-1, 1,  0, 0, w); }
          ctx.drawImage(img, 0, 0, img.width, img.height);
          return canvas.toDataURL("image/jpeg", quality);
        }
        const full = scaleTo(1024, 0.85);   // sent to the API; kept only in memory
        const thumb = scaleTo(240, 0.7);    // small, persisted in the log
        resolve({ dataUrl: full, base64: full.split(",")[1], thumb: thumb });
      };
      img.onerror = function () { reject(new Error("Couldn't read that image. JPEG or PNG works best.")); };
      img.src = reader.result;
    };
    reader.onerror = function () { reject(new Error("Couldn't read that file.")); };
    reader.readAsDataURL(file);
  });
}

// HEIC support: lazy-load the converter only when a HEIC file can't be decoded natively.
let _heicPromise = null;
function ensureHeic() {
  if (typeof heic2any === "function") return Promise.resolve(true);

  _heicPromise = new Promise(function (resolve, reject) {
    const s = document.createElement("script");
    s.src = "https://unpkg.com/heic2any@0.0.3/dist/heic2any.min.js";
    s.onload = function () { (typeof heic2any === "function") ? resolve(true) : reject(new Error("HEIC support failed to load.")); };
    s.onerror = function () { _heicPromise = null; reject(new Error("Couldn't load HEIC support (offline?).")); };

}

// Only if that fails on a HEIC file do we convert with heic2any, then retry.
async function fileToImageData(file) {
  try {
    return await processImage(file);
  } catch (e) {
    if (!isHeicFile(file)) throw e;
    await ensureHeic();
    let out = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.9 });
    if (Array.isArray(out)) out = out[0];

// ---- Storage + helpers ----------------------------------------------------
const load = function (k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch (e) { return fb; } };
const save = function (k, v) { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch (e) { return false; } };
const rnd = function (n) { return Math.round(Number(n) || 0); };
const pad = function (n) { return String(n).padStart(2, "0"); };
const dstr = function (d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); };
const todayKey = function () { return dstr(new Date()); };
const fmtTime = function (h, m) { const ap = h < 12 ? "AM" : "PM"; let hh = h % 12; if (hh === 0) hh = 12; return hh + ":" + pad(m) + " " + ap; };
const shortDate = function (key) { try { const d = new Date(key + "T00:00:00"); return (d.getMonth() + 1) + "/" + d.getDate(); } catch (e) { return key; } };

// Read capture date/time from a JPEG's EXIF (DateTimeOriginal). Returns {date,hour,minute} or null.
function readExifDateTime(file) {
  return new Promise(function (resolve) {
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const view = new DataView(reader.result);
        if (view.getUint16(0) !== 0xFFD8) { resolve(null); return; }

  });
}

}

const DEFAULT_GOALS = { calories: 2000, protein: 150, fat: 65, carbs: 250 };
const CATEGORIES = [
  { key: "calories", label: "Calories", short: "Cal", color: "#E8703A" },
  { key: "protein", label: "Protein", short: "P", color: "#E85D74" },
  { key: "fat", label: "Fat", short: "F", color: "#F2B43E" },
  { key: "carbs", label: "Carbs", short: "C", color: "#8CBC58" },
];
const MACROS = CATEGORIES.slice(1);
const EXTRAS = [
  { key: "fiber", label: "Fiber", unit: "g" }, { key: "sugar", label: "Sugars", unit: "g" },
  { key: "saturated_fat", label: "Saturated fat", unit: "g" }, { key: "sodium", label: "Sodium", unit: "mg" },
  { key: "cholesterol", label: "Cholesterol", unit: "mg" }, { key: "potassium", label: "Potassium", unit: "mg" },
];
const DEFAULT_ALERTS = {
  calories: { enabled: false, mode: "above", days: 3 },
  protein: { enabled: false, mode: "below", days: 3 },
  fat: { enabled: false, mode: "above", days: 3 },
  carbs: { enabled: false, mode: "above", days: 3 },
};
// Metabolic-health alerts (general guidance — editable, not medical advice).
const HEALTH_LIST = [
  { key: "sugar", label: "Sugars", color: "#D96E94", unit: "g" },
  { key: "fiber", label: "Fiber", color: "#4FB096", unit: "g" },
  { key: "saturated_fat", label: "Saturated fat", color: "#DEA34F", unit: "g" },
  { key: "sodium", label: "Sodium", color: "#74A4D0", unit: "mg" },
];
const DEFAULT_HEALTH = {
  sugar: { enabled: true, mode: "above", threshold: 50, days: 3 },
  fiber: { enabled: true, mode: "below", threshold: 25, days: 3 },
  saturated_fat: { enabled: true, mode: "above", threshold: 20, days: 3 },
  sodium: { enabled: true, mode: "above", threshold: 2300, days: 3 },
};
const DASH_CATS = [
  { key: "calories", label: "Calories", color: "#E8703A", core: true },
  { key: "protein", label: "Protein", color: "#E85D74", core: true },
  { key: "fat", label: "Fat", color: "#F2B43E", core: true },
  { key: "carbs", label: "Carbs", color: "#8CBC58", core: true },
  { key: "sugar", label: "Sugars", color: "#D96E94", core: false },
  { key: "fiber", label: "Fiber", color: "#4FB096", core: false },
  { key: "saturated_fat", label: "Sat fat", color: "#DEA34F", core: false },
  { key: "sodium", label: "Sodium", color: "#74A4D0", core: false },
];
const SUM_KEYS = ["calories", "protein", "fat", "carbs", "sugar", "fiber", "saturated_fat", "sodium"];

function groupByDay(history) {
  const m = {};
  history.forEach(function (h) {
    if (!h.date) return; const t = h.total || {};
    const r = m[h.date] || { count: 0 };
    SUM_KEYS.forEach(function (k) { r[k] = (r[k] || 0) + (t[k] || 0); });
    r.count += 1;
    m[h.date] = r;
  });
  return m;
}
function dailySeries(history, key, days) {
  const byDay = groupByDay(history); const today = new Date(); today.setHours(0, 0, 0, 0); const out = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate() - i); const k = dstr(d); const rec = byDay[k];
    out.push({ date: k, value: rec ? (rec[key] || 0) : 0, has: !!rec, short: (d.getMonth() + 1) + "/" + d.getDate() });
  }
  return out;
}
function periodStats(history, key, days, goal) {
  const s = dailySeries(history, key, days); const logged = s.filter(function (x) { return x.has; });
  if (!logged.length) return null;
  const sum = logged.reduce(function (a, x) { return a + x.value; }, 0);
  const best = logged.reduce(function (a, x) { return Math.max(a, x.value); }, 0);
  return { avg: Math.round(sum / logged.length), best: Math.round(best), days: logged.length };
}
function evalRules(history, rules) {
  const byDay = groupByDay(history); const allDates = Object.keys(byDay).sort().reverse(); const tk = todayKey(); const out = [];
  rules.forEach(function (r) {
    if (!r.enabled) return;
    // For "below goal" rules, don't count today — it's usually still in progress.
    const dates = (r.mode === "below" && allDates[0] === tk) ? allDates.slice(1) : allDates;
    let streak = 0;
    for (let i = 0; i < dates.length; i++) {
      const v = byDay[dates[i]][r.key] || 0;
      const bad = r.mode === "below" ? v < r.target : v > r.target;
      if (bad) streak++; else break;
    }
    if (streak >= r.days) out.push({ id: r.key + "_" + r.mode, color: r.color, health: r.health, text: r.label + " " + r.phrase + " " + streak + " logged " + (streak === 1 ? "day" : "days") + " running." });
  });

}

function downloadFile(filename, text, mime) {
  const blob = new Blob([text], { type: mime }); const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
}
function buildCSV(history, days, label) {
  const today = new Date(); today.setHours(0, 0, 0, 0); const start = new Date(today); start.setDate(today.getDate() - (days - 1));
  const byDay = groupByDay(history); const lines = [];
  lines.push("MealLens " + label + " report," + dstr(start) + " to " + dstr(today)); lines.push("");
  lines.push("Date,Meals,Calories,Protein (g),Fat (g),Carbs (g)");
  let tC = 0, tP = 0, tF = 0, tCa = 0, ld = 0, tm = 0;
  for (let i = 0; i < days; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i); const k = dstr(d); const r = byDay[k];
    const c = r ? Math.round(r.calories) : 0, p = r ? Math.round(r.protein) : 0, f = r ? Math.round(r.fat) : 0, ca = r ? Math.round(r.carbs) : 0, mc = r ? r.count : 0;
    lines.push([k, mc, c, p, f, ca].join(","));

  }
  lines.push(""); lines.push("Total," + tm + "," + Math.round(tC) + "," + Math.round(tP) + "," + Math.round(tF) + "," + Math.round(tCa));
  const a = ld ? [Math.round(tC / ld), Math.round(tP / ld), Math.round(tF / ld), Math.round(tCa / ld)] : [0, 0, 0, 0];
  lines.push("Daily average (logged days),," + a[0] + "," + a[1] + "," + a[2] + "," + a[3]);

}

function smoothPath(p) {
  if (!p.length) return ""; if (p.length === 1) return "M " + p[0].x + " " + p[0].y;
  let d = "M " + p[0].x + " " + p[0].y; const t = 0.16;
  for (let i = 0; i < p.length - 1; i++) {
    const p0 = p[i - 1] || p[i], p1 = p[i], p2 = p[i + 1], p3 = p[i + 2] || p2;
    const c1x = p1.x + (p2.x - p0.x) * t, c1y = p1.y + (p2.y - p0.y) * t;
    const c2x = p2.x - (p3.x - p1.x) * t, c2y = p2.y - (p3.y - p1.y) * t;
    d += " C " + c1x + " " + c1y + ", " + c2x + " " + c2y + ", " + p2.x + " " + p2.y;
  }

}

// ---- Chart ----------------------------------------------------------------
function LineChart(props) {

  const line = smoothPath(pts);
  const area = pts.length ? line + " L " + pts[pts.length - 1].x + " " + (padT + plotH) + " L " + pts[0].x + " " + (padT + plotH) + " Z" : "";

                  <div key={cat.key} className="flex flex-wrap items-center gap-2 py-2">
                    <button onClick={function () { updateAlert(cat.key, "enabled", !on); }} className="rounded-full px-3 py-1 text-xs font-bold text-white transition" style={{ background: on ? cat.color : "#4A3B2A" }}>{cat.label}</button>
                    <select value={c.mode} onChange={function (e) { updateAlert(cat.key, "mode", e.target.value); }} disabled={!on} className={"rounded-lg border border-[#3A2D20] bg-[#241B14] px-2 py-1 text-xs " + (on ? "text-[#C9B69E]" : "text-[#6E6150]")}>
                      <option value="below">below</option><option value="above">above</option>
                    </select>
                    <span className={"text-xs " + (on ? "text-[#A2917A]" : "text-[#6E6150]")}>goal for</span>
                    <input type="number" inputMode="numeric" value={c.days} disabled={!on} onChange={function (e) { updateAlert(cat.key, "days", Math.max(1, rnd(e.target.value) || 1)); }} className={"w-12 rounded-lg border border-[#3A2D20] px-2 py-1 text-center text-xs font-semibold outline-none focus:border-[#D85A28] " + (on ? "text-[#C9B69E]" : "text-[#6E6150]")} />
                    <span className={"text-xs " + (on ? "text-[#A2917A]" : "text-[#6E6150]")}>days</span>
                  </div>
                );
              })}
            </div>

            <h2 className="font-display mb-1 mt-5 text-base font-semibold text-[#F2E6D4]">Metabolic-health alerts</h2>
            <p className="mb-2 text-xs text-[#A2917A]">General blood-sugar-friendly guidance — not medical advice. Set the numbers your doctor or dietitian recommends.</p>
            <div className="divide-y divide-[#36291B]">
              {HEALTH_LIST.map(function (h) {
                const c = healthCfg[h.key]; const on = c.enabled;
                return (
                  <div key={h.key} className="flex flex-wrap items-center gap-2 py-2">
                    <button onClick={function () { updateHealth(h.key, "enabled", !on); }} className="rounded-full px-3 py-1 text-xs font-bold text-white transition" style={{ background: on ? h.color : "#4A3B2A" }}>{h.label}</button>
                    <span className={"text-xs " + (on ? "text-[#A2917A]" : "text-[#6E6150]")}>{c.mode === "below" ? "below" : "above"}</span>
                    <div className={"flex items-center rounded-lg border border-[#3A2D20] px-2 " + (on ? "" : "opacity-60")}>
                      <input type="number" inputMode="numeric" value={c.threshold} disabled={!on} onChange={function (e) { updateHealth(h.key, "threshold", Math.max(0, rnd(e.target.value))); }} className={"w-14 bg-transparent py-1 text-center text-xs font-semibold outline-none " + (on ? "text-[#C9B69E]" : "text-[#6E6150]")} />
                      <span className="text-[10px] text-[#7C6E5A]">{h.unit}</span>
                    </div>
                    <span className={"text-xs " + (on ? "text-[#A2917A]" : "text-[#6E6150]")}>for</span>
                    <input type="number" inputMode="numeric" value={c.days} disabled={!on} onChange={function (e) { updateHealth(h.key, "days", Math.max(1, rnd(e.target.value) || 1)); }} className={"w-12 rounded-lg border border-[#3A2D20] px-2 py-1 text-center text-xs font-semibold outline-none focus:border-[#D85A28] " + (on ? "text-[#C9B69E]" : "text-[#6E6150]")} />
                    <span className={"text-xs " + (on ? "text-[#A2917A]" : "text-[#6E6150]")}>days</span>
                  </div>
                );
              })}
            </div>

            <div className="mt-5 flex gap-2">
              <button onClick={saveSettings} className={"flex flex-1 items-center justify-center gap-1.5 rounded-xl py-2.5 text-sm font-semibold " + PRIMARY}><IconCheck size={16} /> Save</button>
              {apiKey && <button onClick={function () { setShowSettings(false); }} className="rounded-xl border border-[#3A2D20] px-4 text-sm font-medium text-[#B9A88F] transition hover:bg-[#2A2016]">Cancel</button>}
            </div>
          </section>
        )}

        <section className={"mb-6 p-5 " + CARD}>
          <div className="flex items-baseline justify-between">
            <span className="text-xs font-semibold uppercase tracking-wide text-[#A2917A]">Today</span>
            <span className="text-xs text-[#7C6E5A]">{todays.length} {todays.length === 1 ? "meal" : "meals"}</span>
          </div>
          <div className="mt-3 flex items-center justify-around">
            <Ring value={rnd(dayTotal.calories)} goal={goals.calories} label="Calories" unit="" color="#E8703A" />
            <Ring value={rnd(dayTotal.protein)} goal={goals.protein} label="Protein" unit="g" color="#E85D74" />
          </div>
          <div className="mt-3 grid grid-cols-2 gap-2">
            {MACROS.slice(1).map(function (m) {
              return (
                <div key={m.key} className="flex items-center justify-between rounded-xl px-3 py-2" style={{ background: m.color + "12", color: m.color }}>
                  <span className="text-[11px] font-semibold uppercase tracking-wide" style={{ opacity: .8 }}>{m.label}</span>
                  <span className="text-sm font-bold">{rnd(dayTotal[m.key])}<span style={{ opacity: .55 }} className="font-normal">/{goals[m.key]}g</span></span>
                </div>
              );
            })}
          </div>
        </section>

        {processing && (
          <div className={"rise mb-6 flex items-center justify-center gap-2 py-8 text-sm font-medium text-[#A2917A] " + CARD}>
            <IconSpinner size={18} /> Preparing photos…
          </div>
        )}

        {!imageUrl && !processing && (
          <label className="group mb-6 flex w-full cursor-pointer flex-col items-center justify-center gap-3 rounded-[26px] border-2 border-dashed border-[#3E3022] bg-[#241B14]/70 py-14 text-[#A2917A] transition hover:border-[#D85A28] hover:text-[#D85A28] active:scale-[.99]">
            <div className="flex h-14 w-14 items-center justify-center rounded-full bg-[#322619] transition group-hover:bg-gradient-to-br group-hover:from-[#F0814A] group-hover:to-[#D85A28] group-hover:text-white"><IconCamera size={26} /></div>
            <span className="text-sm font-semibold">Take or choose photos</span>
            <span className="-mt-2 text-xs text-[#7C6E5A]">Pick one or several at once · iPhone HEIC supported</span>
            <input type="file" accept="image/*,.heic,.heif" multiple onChange={onPick} className="sr-only" />
          </label>
        )}

        {imageUrl && (
          <div className={"rise mb-6 overflow-hidden " + CARD}>
            <img src={imageUrl} alt="Your meal" className="h-56 w-full object-cover" />
            {!result && !loading && (
              <div className="flex gap-2 p-3">
                <button onClick={run} className={"flex flex-1 items-center justify-center gap-2 rounded-xl py-3 text-sm font-semibold " + PRIMARY}>Analyze meal</button>
                <button onClick={nextMeal} className="flex items-center justify-center rounded-xl border border-[#3A2D20] px-4 text-[#A2917A] transition hover:bg-[#2A2016]" aria-label={queue.length ? "Skip to next photo" : "Discard photo"}><IconRefresh size={18} /></button>
              </div>
            )}
            {loading && <div className="flex items-center justify-center gap-2 py-5 text-sm font-medium text-[#A2917A]"><IconSpinner size={18} /> Reading your plate…</div>}
          </div>
        )}

        {error && <div className="rise mb-6 flex items-start gap-2 rounded-2xl border border-[#5E2C22] bg-[#3A1E18] p-4 text-sm text-[#F0A491]"><span className="mt-0.5 shrink-0"><IconAlert size={18} /></span><span>{error}</span></div>}

        {result && (
          <div className={"rise mb-6 p-5 " + CARD}>
            <div className="flex items-center gap-2">
              <span className="gradient-text font-display text-6xl font-semibold tracking-tight">{rnd(liveTotal.calories)}</span>
              <span className="mb-1 self-end text-sm text-[#A2917A]">Cal</span>
              <span className="ml-auto rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wide" style={{ background: (result.confidence === "high" ? "#8CBC58" : result.confidence === "medium" ? "#F2B43E" : "#8E7F6A") + "1f", color: result.confidence === "high" ? "#86BC55" : result.confidence === "medium" ? "#E0A23A" : "#A2917A" }}>{result.confidence || "—"} confidence</span>
            </div>

            <div className="mt-4 flex h-2.5 w-full overflow-hidden rounded-full bg-[#34281B]">
              <div style={{ width: split.p + "%", background: "#E85D74" }} />
              <div style={{ width: split.c + "%", background: "#8CBC58" }} />
              <div style={{ width: split.f + "%", background: "#F2B43E" }} />
            </div>

            <div className="mt-4 grid grid-cols-3 gap-3">
              {MACROS.map(function (m) {
                return (
                  <div key={m.key} className="rounded-2xl p-3 text-center" style={{ background: m.color + "10" }}>
                    <div className="mx-auto flex h-6 w-6 items-center justify-center rounded-full text-xs font-bold text-white" style={{ background: m.color }}>{m.short}</div>
                    <div className="font-display mt-1 text-lg font-semibold text-[#F2E6D4]">{rnd(liveTotal[m.key])}g</div>
                    <div className="text-[10px] font-semibold uppercase tracking-wide text-[#A2917A]">{m.label}</div>
                  </div>
                );
              })}
            </div>

            {extrasPresent.length > 0 && (
              <div className="mt-4 overflow-hidden rounded-2xl border border-[#3A2D20]">
                <button onClick={function () { setShowDetail(function (s) { return !s; }); }} className="flex w-full items-center justify-between bg-[#2C2117] px-4 py-2.5 text-sm font-semibold text-[#C9B69E]">
                  <span>Full nutrition <span className="font-normal text-[#A2917A]">(estimated)</span></span><IconChevron size={16} open={showDetail} />
                </button>
                {showDetail && (
                  <div className="grid grid-cols-2 gap-x-4 gap-y-0.5 px-4 py-3">
                    {extrasPresent.map(function (x) {
                      return (
                        <div key={x.key} className="flex items-center justify-between border-b border-[#36291B] py-1.5 text-sm last:border-0">
                          <span className="text-[#B9A88F]">{x.label}</span><span className="font-semibold text-[#F2E6D4]">{rnd(Number(result.total[x.key]) * ratio)}{x.unit}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            <div className="mt-4">
              <div className="mb-1 flex items-center justify-between">
                <p className="text-[11px] font-semibold uppercase tracking-wide text-[#A2917A]">Tap an item to edit</p>
                <button onClick={addItem} className="rounded-lg px-2 py-1 text-xs font-bold text-[#D85A28] transition hover:bg-[#322619]">+ Add item</button>
              </div>
              {items.length === 0 && <p className="py-2 text-sm text-[#7C6E5A]">No items — tap “Add item” to enter one manually.</p>}
              <ul className="divide-y divide-[#36291B]">
                {items.map(function (it) {
                  const open = expanded === it.uid;
                  return (
                    <li key={it.uid} className="py-1">
                      <button onClick={function () { setExpanded(open ? null : it.uid); }} className="flex w-full items-center justify-between py-2 text-left text-sm">
                        <span className="font-medium capitalize text-[#E9DDCB]">{it.name || "(unnamed)"}{(it.portion || 1) !== 1 && <span className="ml-1.5 rounded bg-[#36291B] px-1.5 py-0.5 text-[10px] font-bold text-[#A2917A]">{it.portion}×</span>}</span>
                        <span className="text-[#7C6E5A]">{rnd(it.calories)} Cal</span>
                      </button>
                      {open && (
                        <div className="space-y-2 pb-3 pt-1">
                          <input value={it.name} onChange={function (e) { updateItem(it.uid, "name", e.target.value); }} placeholder="Item name" className="w-full rounded-lg border border-[#3A2D20] px-2.5 py-1.5 text-sm outline-none focus:border-[#D85A28]" />
                          <div className="flex items-center justify-between rounded-lg bg-[#2C2117] px-3 py-1.5">
                            <span className="text-[11px] font-semibold uppercase tracking-wide text-[#A2917A]">Portion</span>
                            <div className="flex items-center gap-3">
                              <button onClick={function () { updatePortion(it.uid, (it.portion || 1) - 0.25); }} className="flex h-7 w-7 items-center justify-center rounded-full border border-[#3A2D20] text-[#C9B69E] transition hover:bg-[#241B14] active:scale-95"><IconMinus size={14} /></button>
                              <span className="min-w-[2.75rem] text-center text-sm font-bold text-[#F2E6D4]">{it.portion || 1}×</span>
                              <button onClick={function () { updatePortion(it.uid, (it.portion || 1) + 0.25); }} className="flex h-7 w-7 items-center justify-center rounded-full border border-[#3A2D20] text-[#C9B69E] transition hover:bg-[#241B14] active:scale-95"><IconPlus size={14} /></button>
                            </div>
                          </div>
                          <div className="grid grid-cols-4 gap-2">
                            {EDIT_FIELDS.map(function (pair) {
                              return (
                                <label key={pair[0]} className="block">
                                  <span className="text-[10px] font-semibold uppercase tracking-wide text-[#A2917A]">{pair[1]}</span>
                                  <input type="number" inputMode="decimal" value={it[pair[0]]} onChange={function (e) { updateItem(it.uid, pair[0], e.target.value); }} className="mt-0.5 w-full rounded-lg border border-[#3A2D20] px-2 py-1.5 text-sm font-semibold outline-none focus:border-[#D85A28]" />
                                </label>
                              );
                            })}
                          </div>
                          <button onClick={function () { removeItem(it.uid); }} className="flex items-center gap-1 text-xs font-medium text-[#E85D74] transition hover:opacity-80"><IconTrash size={13} /> Remove item</button>
                        </div>
                      )}
                    </li>
                  );
                })}
              </ul>
            </div>

            {result.notes && <p className="mt-3 text-xs leading-relaxed text-[#A2917A]">{result.notes}</p>}

            <div className="mt-4 flex rounded-xl bg-[#36291B] p-0.5 text-xs font-semibold">
              {["Breakfast", "Lunch", "Dinner"].map(function (t) {
                return <button key={t} onClick={function () { setMealType(t); setSavedId(null); }} className={"flex-1 rounded-lg py-1.5 transition " + (mealType === t ? "bg-[#4A3A28] text-[#F2E6D4] shadow-sm" : "text-[#A2917A]")}>{t}</button>;
              })}
            </div>
            <div className="mt-2 flex items-center gap-2">
              <input type="date" value={mealDate} onChange={function (e) { setMealDate(e.target.value); setSavedId(null); }} className="flex-1 rounded-xl border border-[#3A2D20] px-3 py-2 text-sm text-[#E9DDCB] outline-none focus:border-[#D85A28]" />
              <span className="whitespace-nowrap text-[11px] text-[#7C6E5A]">{dateSrc === "photo" ? "from photo · " + mealTime : dateSrc === "file" ? "file date · " + mealTime : "today"}</span>
            </div>

            <div className="mt-4 flex gap-2">
              <button onClick={logMeal} className={"flex flex-1 items-center justify-center gap-2 rounded-xl py-3 text-sm font-semibold " + (savedId !== null ? "bg-[#4E7A33] text-white" : PRIMARY)}>
                {savedId !== null ? "Logged ✓ — tap to update" : <span className="flex items-center gap-2"><IconPlus size={16} /> Add to log</span>}
              </button>
              <button onClick={nextMeal} className="rounded-xl border border-[#3A2D20] px-4 text-sm font-medium text-[#B9A88F] transition hover:bg-[#2A2016]">{queue.length ? "Next ▸ " + queue.length : "New"}</button>
            </div>
            <p className="mt-3 text-center text-[10px] text-[#6E6150]">Estimates only — not a substitute for precise tracking or medical advice.</p>
          </div>
        )}

        {imageUrl && (
          <div className="mb-6 flex flex-wrap items-center gap-2">
            <label className="flex cursor-pointer items-center gap-1.5 rounded-xl border border-[#3A2D20] bg-[#241B14] px-3 py-2 text-xs font-semibold text-[#C9B69E] transition hover:bg-[#2A2016]">
              <IconPlus size={14} /> Add another
              <input type="file" accept="image/*,.heic,.heif" multiple onChange={onAppend} className="sr-only" />
            </label>
            {queue.length > 0 && <span className="text-xs font-medium text-[#A2917A]">{queue.length} up next</span>}
            {queue.map(function (q) {
              return (
                <div key={q.id} className="relative">
                  <img src={q.imageUrl} alt="" className="h-10 w-10 rounded-lg object-cover" />
                  <button onClick={function () { removeQueued(q.id); }} className="absolute -right-1.5 -top-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-[#D85A28] text-[10px] font-bold leading-none text-white" aria-label="Remove from queue">×</button>
                </div>
              );
            })}
          </div>
        )}

        {history.length > 0 && (
          <section className={"mb-6 p-5 " + CARD}>
            <div className="mb-3 flex items-center justify-between">
              <h2 className="font-display text-base font-semibold text-[#F2E6D4]">Dashboard</h2>
              <div className="flex rounded-full bg-[#36291B] p-0.5 text-xs font-semibold">
                {[7, 30].map(function (d) { return <button key={d} onClick={function () { setDashRange(d); }} className={"rounded-full px-3 py-1 transition " + (dashRange === d ? "bg-[#4A3A28] text-[#F2E6D4] shadow-sm" : "text-[#A2917A]")}>{d}d</button>; })}
              </div>
            </div>
            <div className="mb-3 flex flex-wrap gap-1.5">
              {DASH_CATS.map(function (c) {
                const on = dashCat === c.key;
                return <button key={c.key} onClick={function () { setDashCat(c.key); }} className="rounded-full px-3 py-1 text-xs font-semibold transition" style={on ? { background: c.color, color: "#fff" } : { background: c.color + "14", color: c.color }}>{c.label}</button>;
              })}
            </div>
            <LineChart series={series} goal={dashGoal} color={catObj.color} idKey={dashCat + "_" + dashRange} />
            <div className="mt-2 grid grid-cols-3 gap-2 text-center">
              <div className="rounded-xl bg-[#2C2117] py-2"><div className="font-display text-lg font-semibold text-[#F2E6D4]">{stats ? stats.avg : "—"}</div><div className="text-[10px] uppercase tracking-wide text-[#A2917A]">Avg/day</div></div>
              <div className="rounded-xl bg-[#2C2117] py-2"><div className="font-display text-lg font-semibold text-[#F2E6D4]">{stats ? stats.best : "—"}</div><div className="text-[10px] uppercase tracking-wide text-[#A2917A]">Best day</div></div>
              <div className="rounded-xl bg-[#2C2117] py-2"><div className="font-display text-lg font-semibold text-[#F2E6D4]">{stats ? stats.days : 0}</div><div className="text-[10px] uppercase tracking-wide text-[#A2917A]">Days logged</div></div>
            </div>
          </section>
        )}

        {history.length > 0 && (
          <section className={"mb-6 p-5 " + CARD}>
            <h2 className="font-display mb-3 text-base font-semibold text-[#F2E6D4]">Download reports</h2>
            <div className="flex gap-2">
              <button onClick={function () { exportReport(7, "Weekly"); }} className={"flex flex-1 items-center justify-center gap-1.5 rounded-xl py-2.5 text-sm font-semibold " + PRIMARY}><IconDownload size={15} /> Week (CSV)</button>
              <button onClick={function () { exportReport(30, "Monthly"); }} className="flex flex-1 items-center justify-center gap-1.5 rounded-xl border border-[#3A2D20] py-2.5 text-sm font-semibold text-[#C9B69E] transition hover:bg-[#2A2016]"><IconDownload size={15} /> Month (CSV)</button>
            </div>
            <div className="mt-2 flex gap-2">
              <button onClick={exportBackup} className="flex flex-1 items-center justify-center gap-1.5 rounded-xl border border-[#3A2D20] py-2.5 text-sm font-semibold text-[#C9B69E] transition hover:bg-[#2A2016]"><IconDownload size={15} /> Full backup (JSON)</button>
              <label className="flex flex-1 cursor-pointer items-center justify-center gap-1.5 rounded-xl border border-[#3A2D20] py-2.5 text-sm font-semibold text-[#C9B69E] transition hover:bg-[#2A2016]">
                ↑ Restore backup<input type="file" accept=".json" onChange={importBackup} className="sr-only" />
              </label>
            </div>
          </section>
        )}

        {history.length > 0 && (
          <section>
            <h2 className="mb-2 px-1 text-xs font-semibold uppercase tracking-wide text-[#A2917A]">Recent log</h2>
            <ul className="space-y-2">
              {history.slice(0, 12).map(function (h) {
                const t = h.total || {};
                return (
                  <li key={h.id} className={"flex items-center gap-3 p-2.5 " + CARD}>
                    {h.image && <img src={h.image} alt="" className="h-12 w-12 shrink-0 rounded-xl object-cover" />}
                    <div className="min-w-0 flex-1">
                      <div className="truncate text-sm font-semibold capitalize text-[#E9DDCB]">{h.name}</div>
                      <div className="text-xs text-[#A2917A]">{h.mealType ? h.mealType + " · " : ""}{h.date !== todayKey() ? shortDate(h.date) + " · " : ""}{h.time} · {rnd(t.protein)}p / {rnd(t.fat)}f / {rnd(t.carbs)}c</div>
                    </div>
                    <div className="text-right"><div className="font-display text-base font-semibold text-[#F2E6D4]">{rnd(t.calories)}</div><div className="text-[10px] text-[#7C6E5A]">Cal</div></div>
                    <button onClick={function () { removeEntry(h.id); }} className="rounded-lg p-2 text-[#6E6150] transition hover:bg-[#3A1E18] hover:text-[#E85D74]" aria-label="Delete entry"><IconTrash size={16} /></button>
                  </li>
                );
              })}
            </ul>
          </section>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MealLens />);
</script>
</body>
</html>
